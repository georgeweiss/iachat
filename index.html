<body>
<div id="app">

  <header>
    <div class="h-left">
      <div class="logo">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div class="h-title">IA<span>Chat</span></div>
      <span class="badge">gpt-oss-120b</span>
    </div>
    <div class="dot"></div>
  </header>

  <div id="messages">
    <div id="empty">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h2>Como posso ajudar?</h2>
      <p>Powered by Groq &mdash; GPT OSS 120B</p>
      <div class="suggestions">
        <button class="sug" onclick="useSug(this)">Explique como funciona a IA de forma simples</button>
        <button class="sug" onclick="useSug(this)">Escreva um script Python para renomear arquivos em massa</button>
        <button class="sug" onclick="useSug(this)">Quais sao as novidades do mundo tech em 2025?</button>
      </div>
    </div>
  </div>

  <div id="footer">
    <div class="iw">
      <textarea id="inp" placeholder="Digite sua mensagem..." rows="1"></textarea>
      <button id="btn" onclick="send()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="fbar">
      <span class="hint">Enter envia &middot; Shift+Enter nova linha</span>
      <button id="clr" onclick="clearChat()">limpar</button>
    </div>
  </div>

</div>
<script>
var KEY = "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";
var MODEL = "openai/gpt-oss-120b";
var APIURL = "https://api.groq.com/openai/v1/chat/completions";
var history = [];
var busy = false;

var msgs = document.getElementById(“messages”);
var inp = document.getElementById(“inp”);
var btn = document.getElementById(“btn”);
var empty = document.getElementById(“empty”);

inp.addEventListener(“input”, function() {
this.style.height = “auto”;
this.style.height = Math.min(this.scrollHeight, 120) + “px”;
});

inp.addEventListener(“keydown”, function(e) {
if (e.key === “Enter” && !e.shiftKey) {
e.preventDefault();
send();
}
});

function useSug(el) {
inp.value = el.textContent;
inp.style.height = “auto”;
inp.style.height = Math.min(inp.scrollHeight, 120) + “px”;
send();
}

function clearChat() {
history = [];
var kids = Array.prototype.slice.call(msgs.children);
for (var i = 0; i < kids.length; i++) {
if (kids[i].id !== “empty”) msgs.removeChild(kids[i]);
}
empty.style.display = “flex”;
}

function esc(t) {
return t.replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”);
}

function fmt(t) {
t = t.replace(/`[\w]*\n?([\s\S]*?)`/g, function(m,c){ return “<pre><code>” + esc(c.trim()) + “</code></pre>”; });
t = t.replace(/`([^`]+)`/g, function(m,c){ return “<code>” + esc(c) + “</code>”; });
t = t.replace(/**(.+?)**/g, “<strong>$1</strong>”);
t = t.replace(/\n/g, “<br>”);
return t;
}

function addMsg(role, text) {
empty.style.display = “none”;
var d = document.createElement(“div”);
d.className = “msg “ + role;
var av = role === “user” ? “V” : “G”;
var body = role === “ai” ? fmt(text) : esc(text).replace(/\n/g,”<br>”);
d.innerHTML = “<div class="av">” + av + “</div><div class="bbl">” + body + “</div>”;
msgs.appendChild(d);
msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
empty.style.display = “none”;
var d = document.createElement(“div”);
d.className = “msg ai”;
d.id = “typing”;
d.innerHTML = “<div class="av">G</div><div class="bbl"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>”;
msgs.appendChild(d);
msgs.scrollTop = msgs.scrollHeight;
}

function rmTyping() {
var el = document.getElementById(“typing”);
if (el) el.parentNode.removeChild(el);
}

function showErr(m) {
rmTyping();
var d = document.createElement(“div”);
d.className = “err”;
d.textContent = “Erro: “ + m;
msgs.appendChild(d);
msgs.scrollTop = msgs.scrollHeight;
}

async function send() {
var text = inp.value.trim();
if (!text || busy) return;
busy = true;
btn.disabled = true;
inp.value = “”;
inp.style.height = “auto”;

addMsg(“user”, text);
history.push({ role: “user”, content: text });
showTyping();

try {
var res = await fetch(APIURL, {
method: “POST”,
headers: {
“Content-Type”: “application/json”,
“Authorization”: “Bearer “ + KEY
},
body: JSON.stringify({
model: MODEL,
messages: history,
temperature: 0.7,
max_tokens: 2048
})
});

```
if (!res.ok) {
  var e = await res.json();
  throw new Error(e.error && e.error.message ? e.error.message : "Status " + res.status);
}

var data = await res.json();
var reply = data.choices[0].message.content;
rmTyping();
addMsg("ai", reply);
history.push({ role: "assistant", content: reply });
```

} catch(err) {
showErr(err.message || “Falha na conexao”);
} finally {
busy = false;
btn.disabled = false;
}
}
</script>
