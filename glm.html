<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IA Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="https://js.puter.com/v2/"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
        html,body{height:100%;width:100%;overflow:hidden;background:#0a0a0f;font-family:'DM Mono',monospace;color:#e8e8f0}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
        #app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;z-index:1}

        /* HEADER */
        #hdr{background:#0d0d13;border-bottom:1px solid #222230;padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
        .hl{display:flex;align-items:center;gap:10px;flex-shrink:0}
        .logo{width:30px;height:30px;border-radius:9px;background:#0f2018;border:1px solid #00e5a040;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .logo svg{width:14px;height:14px;stroke:#00e5a0;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
        .htitle{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#e8e8f0;white-space:nowrap}
        .htitle b{color:#00e5a0}
        .dot{width:7px;height:7px;border-radius:50%;background:#00e5a0;box-shadow:0 0 7px #00e5a0;animation:pulse 2s ease-in-out infinite;flex-shrink:0}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

        #model-wrap{display:flex;align-items:center;flex:1;justify-content:center}
        #model-sel{background:#13131c;border:1px solid #222230;color:#c0c0d8;font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;border-radius:20px;outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;max-width:200px;width:100%;text-align:center}

        #pbadge{font-size:10px;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
        #pbadge.puter{color:#00e5a0;background:#0f2018;border:1px solid #00e5a030}
        #pbadge.groq{color:#a78bfa;background:#13101f;border:1px solid #a78bfa30}

        /* MESSAGES */
        #msgs{flex:1;overflow-y:auto;padding:20px 14px;display:flex;flex-direction:column;gap:14px}
        #emp{margin:auto;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;padding:20px}
        .eico{width:54px;height:54px;border-radius:16px;background:#0f2018;border:1px solid #00e5a030;display:flex;align-items:center;justify-content:center}
        .eico svg{width:24px;height:24px;stroke:#00e5a0;fill:none;stroke-width:1.5}
        
        .row{display:flex;gap:9px;animation:fadeup .2s ease}
        .row.me{flex-direction:row-reverse}
        @keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
        
        .av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;flex-shrink:0}
        .row.ai .av{background:#0f2018;border:1px solid #00e5a040;color:#00e5a0}
        .row.me .av{background:#0d1824;border:1px solid #00b8ff40;color:#00b8ff}
        
        .bbl{max-width:calc(100% - 40px);padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.65;word-break:break-word}
        .row.ai .bbl{background:#111118;border:1px solid #222230;color:#d8d8ea;border-top-left-radius:4px}
        .row.me .bbl{background:#131826;border:1px solid #00b8ff25;color:#d8d8ea;border-top-right-radius:4px}

        /* FOOTER */
        #ftr{background:#0d0d13;border-top:1px solid #222230;padding:10px 14px;padding-bottom:max(14px,env(safe-area-inset-bottom))}
        .iw{display:flex;align-items:center;gap:8px;background:#13131c;border:1px solid #222230;border-radius:16px;padding:6px 6px 6px 14px}
        textarea{flex:1;background:transparent;border:none;outline:none;color:#e8e8f0;font-family:'DM Mono',monospace;font-size:16px;resize:none;max-height:100px}
        #sbtn{width:40px;height:40px;border-radius:12px;border:none;background:#00e5a0;cursor:pointer;display:flex;align-items:center;justify-content:center}
        #sbtn.busy{background:#16161f;opacity:0.5;cursor:not-allowed}
        #sbtn svg{width:15px;height:15px;stroke:#000;fill:none;stroke-width:2.5}

        .typing{display:flex;gap:5px;padding:3px 0}
        .td{width:6px;height:6px;border-radius:50%;background:#00e5a0;animation:bo 1.2s infinite}
        @keyframes bo{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}
        .errmsg{margin-left:37px;padding:9px;background:#1f0d0d;border:1px solid #ff505035;border-radius:9px;color:#ff8080;font-size:12px}
    </style>
</head>
<body>
<div id="app">
    <div id="hdr">
        <div class="hl">
            <div class="logo"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
            <div class="htitle">IA<b>Chat</b></div>
        </div>
        <div id="model-wrap">
            <select id="model-sel">
                <optgroup label="GLM via Puter (gratis)">
                    <option value="puter:z-ai/glm-4.7">GLM-4.7</option>
                    <option value="puter:z-ai/glm-4.7-flash" selected>GLM-4.7-Flash</option>
                </optgroup>
                <optgroup label="Groq (API key)">
                    <option value="groq:llama-3.3-70b-versatile">Llama 3.3 70B</option>
                    <option value="groq:llama-3.1-8b-instant">Llama 3.1 8B</option>
                </optgroup>
            </select>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
            <span id="pbadge" class="puter">Puter</span>
            <div class="dot"></div>
        </div>
    </div>
    <div id="msgs">
        <div id="emp">
            <div class="eico"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
            <h2>E ai, o que voce quer?</h2>
            <p>Selecione um modelo e comece a conversar</p>
        </div>
    </div>
    <div id="ftr">
        <div class="iw">
            <textarea id="tinp" placeholder="Manda bala..." rows="1"></textarea>
            <button id="sbtn" type="button">
                <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
        <div style="display:flex;justify-content:space-between;padding:5px 5px 0">
            <span style="font-size:10px;color:#444">Enter envia · Shift+Enter pula linha</span>
            <button id="clrbtn" style="background:none;border:none;color:#444;font-family:inherit;cursor:pointer">limpar</button>
        </div>
    </div>
</div>

<script>
    var GROQ_KEY  = "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";
    var GROQ_URL  = "https://api.groq.com/openai/v1/chat/completions";
    var chatHistory = [];
    var busy = false;

    var msgsEl  = document.getElementById("msgs");
    var empEl   = document.getElementById("emp");
    var tinp    = document.getElementById("tinp");
    var sbtn    = document.getElementById("sbtn");
    var clrbtn  = document.getElementById("clrbtn");
    var selEl   = document.getElementById("model-sel");
    var badge   = document.getElementById("pbadge");

    function updateBadge() {
        var val = selEl.value;
        if (val.indexOf("puter:") === 0) {
            badge.className = "puter";
            badge.textContent = "Puter";
        } else {
            badge.className = "groq";
            badge.textContent = "Groq";
        }
    }

    selEl.addEventListener("change", function() {
        updateBadge();
        chatHistory = [];
    });

    function esc(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function renderMd(s) {
        if(!s) return "";
        // Code blocks
        s = s.replace(/```[\w]*\n?([\s\S]*?)```/g, function(m, c) {
            return "<pre><code>" + esc(c.trim()) + "</code></pre>";
        });
        // Inline code
        s = s.replace(/`([^`\n]+)`/g, function(m, c) { return "<code>" + esc(c) + "</code>"; });
        // Bold
        s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        // Line breaks
        s = s.replace(/\n/g, "<br>");
        return s;
    }

    function getAvatarLabel() {
        var val = selEl.value;
        if (val.indexOf("flash") !== -1) return "F";
        if (val.indexOf("glm") !== -1) return "G";
        return "AI";
    }

    function addRow(role, text) {
        if (empEl) empEl.style.display = "none";
        var d = document.createElement("div");
        d.className = "row " + role;
        var label   = role === "me" ? "V" : getAvatarLabel();
        var content = role === "me" ? esc(text).replace(/\n/g, "<br>") : renderMd(text);
        d.innerHTML = '<div class="av">' + label + '</div><div class="bbl">' + content + '</div>';
        msgsEl.appendChild(d);
        msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    function showTyping() {
        var d = document.createElement("div");
        d.className = "row ai";
        d.id = "typrow";
        d.innerHTML = '<div class="av">' + getAvatarLabel() + '</div><div class="bbl"><div class="typing"><div class="td"></div><div class="td" style="animation-delay:0.2s"></div><div class="td" style="animation-delay:0.4s"></div></div></div>';
        msgsEl.appendChild(d);
        msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    function hideTyping() {
        var el = document.getElementById("typrow");
        if (el) el.remove();
    }

    function showErr(msg) {
        hideTyping();
        var d = document.createElement("div");
        d.className = "errmsg";
        d.textContent = "Erro: " + msg;
        msgsEl.appendChild(d);
        busy = false;
        sbtn.classList.remove("busy");
    }

    async function sendViaPuter(modelId, userMsg) {
        try {
            // Puter.js v2 utiliza esse formato
            const res = await puter.ai.chat(userMsg, { model: modelId });
            hideTyping();
            busy = false;
            sbtn.classList.remove("busy");
            
            let reply = typeof res === 'string' ? res : (res.message?.content || JSON.stringify(res));
            addRow("ai", reply);
            chatHistory.push({ role: "assistant", content: reply });
        } catch (e) {
            showErr(e.message || "Erro no Puter");
        }
    }

    function sendViaGroq(modelId, msgs) {
        var xhr = new XMLHttpRequest();
        xhr.open("POST", GROQ_URL, true);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.setRequestHeader("Authorization", "Bearer " + GROQ_KEY);
        
        xhr.onload = function() {
            hideTyping();
            busy = false;
            sbtn.classList.remove("busy");
            if (xhr.status === 200) {
                var data = JSON.parse(xhr.responseText);
                var reply = data.choices[0].message.content;
                addRow("ai", reply);
                chatHistory.push({ role: "assistant", content: reply });
            } else {
                showErr("Status Groq: " + xhr.status);
            }
        };
        xhr.onerror = function() { showErr("Falha na conexão"); };
        xhr.send(JSON.stringify({ model: modelId, messages: msgs }));
    }

    function doSend() {
        if (busy) return;
        var txt = tinp.value.trim();
        if (!txt) return;

        busy = true;
        sbtn.classList.add("busy");
        addRow("me", txt);
        
        var val = selEl.value;
        var parts = val.split(":");
        var provider = parts[0];
        var modelId = parts[1];

        showTyping();
        
        // Adiciona ao histórico antes de enviar para manter contexto
        var currentMsg = { role: "user", content: txt };
        
        if (provider === "puter") {
            sendViaPuter(modelId, txt);
        } else {
            sendViaGroq(modelId, chatHistory.concat([currentMsg]));
        }
        
        chatHistory.push(currentMsg);
        tinp.value = "";
        tinp.style.height = "auto";
    }

    sbtn.onclick = doSend;
    clrbtn.onclick = function() {
        chatHistory = [];
        msgsEl.innerHTML = "";
        msgsEl.appendChild(empEl);
        empEl.style.display = "flex";
    };

    tinp.onkeydown = function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            doSend();
        }
    };

    tinp.oninput = function() {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 100) + "px";
    };

    window.onload = updateBadge;
</script>
</body>
</html>
