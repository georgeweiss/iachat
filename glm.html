<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IA Chat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="https://js.puter.com/v2/"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;width:100%;overflow:hidden;background:#0a0a0f;font-family:'DM Mono',monospace;color:#e8e8f0}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
        #app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;z-index:1}

        /* HEADER */
        #hdr{background:#0d0d13;border-bottom:1px solid #222230;padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
        .hl{display:flex;align-items:center;gap:10px}
        .logo{width:30px;height:30px;border-radius:9px;background:#0f2018;border:1px solid #00e5a040;display:flex;align-items:center;justify-content:center}
        .logo svg{width:14px;height:14px;stroke:#00e5a0;fill:none;stroke-width:2}
        .htitle{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
        .htitle b{color:#00e5a0}

        #model-sel{background:#13131c;border:1px solid #222230;color:#c0c0d8;font-size:11px;padding:5px 10px;border-radius:20px;outline:none;max-width:150px}

        #pbadge{font-size:10px;padding:3px 8px;border-radius:20px}
        .puter{color:#00e5a0;background:#0f2018;border:1px solid #00e5a030}
        .groq{color:#a78bfa;background:#13101f;border:1px solid #a78bfa30}

        /* MESSAGES */
        #msgs{flex:1;overflow-y:auto;padding:20px 14px;display:flex;flex-direction:column;gap:14px}
        #emp{margin:auto;text-align:center;color:#555570}
        
        .row{display:flex;gap:9px;animation:fadeup .2s ease;margin-bottom:4px}
        .row.me{flex-direction:row-reverse}
        @keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
        
        .av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0}
        .row.ai .av{background:#0f2018;border:1px solid #00e5a040;color:#00e5a0}
        .row.me .av{background:#0d1824;border:1px solid #00b8ff40;color:#00b8ff}
        
        .bbl{max-width:calc(100% - 40px);padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.6}
        .row.ai .bbl{background:#111118;border:1px solid #222230}
        .row.me .bbl{background:#131826;border:1px solid #00b8ff25}

        /* FOOTER */
        #ftr{background:#0d0d13;border-top:1px solid #222230;padding:10px 14px;padding-bottom:max(14px,env(safe-area-inset-bottom))}
        .iw{display:flex;align-items:center;gap:8px;background:#13131c;border:1px solid #222230;border-radius:16px;padding:6px 12px}
        textarea{flex:1;background:transparent;border:none;outline:none;color:#e8e8f0;font-family:inherit;font-size:16px;resize:none;padding:8px 0;max-height:120px}
        #sbtn{width:36px;height:36px;border-radius:10px;border:none;background:#00e5a0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition: 0.2s}
        #sbtn.busy{background:#222;opacity:0.5;cursor:not-allowed}
        #sbtn svg{width:18px;height:18px;stroke:#000;fill:none;stroke-width:2.5}

        .typing{display:flex;gap:4px;padding:5px}
        .td{width:5px;height:5px;border-radius:50%;background:#00e5a0;animation:bo 1s infinite}
        @keyframes bo{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    </style>
</head>
<body>

<div id="app">
    <div id="hdr">
        <div class="hl">
            <div class="logo"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
            <div class="htitle">IA<b>Chat</b></div>
        </div>
        <select id="model-sel">
            <optgroup label="Puter (Grátis)">
                <option value="puter:z-ai/glm-4.7-flash" selected>GLM-4.7 Flash</option>
                <option value="puter:z-ai/glm-4.7">GLM-4.7 Pro</option>
            </optgroup>
            <optgroup label="Groq (API Key)">
                <option value="groq:llama-3.3-70b-versatile">Llama 3.3 70B</option>
                <option value="groq:llama-3.1-8b-instant">Llama 3.1 8B</option>
            </optgroup>
        </select>
        <span id="pbadge" class="puter">Puter</span>
    </div>

    <div id="msgs">
        <div id="emp">
            <h2 style="font-family:'Syne';color:#fff;margin-bottom:5px">E aí, o que você quer?</h2>
            <p style="font-size:12px">Mande um "Oi" para começar</p>
        </div>
    </div>

    <div id="ftr">
        <div class="iw">
            <textarea id="tinp" placeholder="Manda bala..." rows="1"></textarea>
            <button id="sbtn" type="button">
                <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
        <div style="display:flex;justify-content:space-between;padding:8px 4px 0;font-size:10px;color:#444">
            <span>Enter envia · Shift+Enter pula</span>
            <span id="clrbtn" style="cursor:pointer">limpar chat</span>
        </div>
    </div>
</div>

<script>
    const GROQ_KEY = "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";
    const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
    
    let chatHistory = [];
    let isBusy = false;

    const msgsEl = document.getElementById("msgs");
    const tinp = document.getElementById("tinp");
    const sbtn = document.getElementById("sbtn");
    const selEl = document.getElementById("model-sel");
    const badge = document.getElementById("pbadge");

    // Ajusta badge ao trocar modelo
    selEl.onchange = () => {
        const isPuter = selEl.value.startsWith("puter:");
        badge.className = isPuter ? "puter" : "groq";
        badge.textContent = isPuter ? "Puter" : "Groq";
        chatHistory = [];
    };

    function addRow(role, text) {
        document.getElementById("emp").style.display = "none";
        const div = document.createElement("div");
        div.className = `row ${role}`;
        const label = role === "me" ? "V" : "AI";
        div.innerHTML = `<div class="av">${label}</div><div class="bbl">${text.replace(/\n/g, '<br>')}</div>`;
        msgsEl.appendChild(div);
        msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    function showTyping() {
        const div = document.createElement("div");
        div.className = "row ai";
        div.id = "typing-indicator";
        div.innerHTML = `<div class="av">AI</div><div class="bbl"><div class="typing"><div class="td"></div><div class="td" style="animation-delay:0.2s"></div><div class="td" style="animation-delay:0.4s"></div></div></div>`;
        msgsEl.appendChild(div);
        msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    async function handleChat() {
        if (isBusy) return;
        const text = tinp.value.trim();
        if (!text) return;

        isBusy = true;
        sbtn.classList.add("busy");
        addRow("me", text);
        tinp.value = "";
        tinp.style.height = "auto";
        showTyping();

        const [provider, modelId] = selEl.value.split(":");

        try {
            let reply = "";
            if (provider === "puter") {
                // Forçamos o uso do texto direto para evitar redirecionamentos complexos
                const res = await puter.ai.chat(text, { model: modelId });
                reply = typeof res === 'string' ? res : res.message.content;
            } else {
                const res = await fetch(GROQ_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
                    body: JSON.stringify({ model: modelId, messages: [...chatHistory, {role: "user", content: text}] })
                });
                const data = await res.json();
                reply = data.choices[0].message.content;
            }

            document.getElementById("typing-indicator")?.remove();
            addRow("ai", reply);
            chatHistory.push({role: "user", content: text}, {role: "assistant", content: reply});

        } catch (err) {
            document.getElementById("typing-indicator")?.remove();
            alert("Erro: " + err.message);
        } finally {
            isBusy = false;
            sbtn.classList.remove("busy");
        }
    }

    // Eventos
    sbtn.addEventListener("click", (e) => {
        e.preventDefault();
        handleChat();
    });

    tinp.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            handleChat();
        }
    });

    document.getElementById("clrbtn").onclick = () => {
        msgsEl.innerHTML = '<div id="emp"><h2 style="font-family:\'Syne\';color:#fff;margin-bottom:5px">E aí, o que você quer?</h2><p style="font-size:12px">Mande um "Oi" para começar</p></div>';
        chatHistory = [];
    };

    tinp.addEventListener("input", function() {
        this.style.height = "auto";
        this.style.height = (this.scrollHeight) + "px";
    });
</script>

</body>
</html>
